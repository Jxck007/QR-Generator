<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Gen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080810;
      --sidebar: #0f0f1a;
      --panel: rgba(255,255,255,0.04);
      --panel-border: rgba(255,255,255,0.08);
      --text: #f0f0ff;
      --muted: #6b7280;
      --accent: linear-gradient(135deg, #7c3aed, #06b6d4, #ec4899);
      --accent-solid: #7c3aed;
      --radius: 14px;
      --shadow: 0 24px 80px rgba(0,0,0,0.35);
      --button: #7c3aed;
      --button-hover: #06b6d4;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'DM Mono', monospace;
      background: radial-gradient(circle at top left, rgba(14,166,211,0.15), transparent 18%),
                  radial-gradient(circle at bottom right, rgba(236,72,153,0.12), transparent 20%),
                  var(--bg);
      color: var(--text);
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    #sidebar {
      width: 340px;
      min-width: 340px;
      height: 100vh;
      overflow-y: auto;
      padding: 24px 20px;
      background: var(--sidebar);
      border-right: 1px solid rgba(255,255,255,0.06);
    }

    #preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow: auto;
      position: relative;
    }

    #preview-pane::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(124,58,237,0.12), transparent 18%),
                  radial-gradient(circle at 70% 80%, rgba(6,182,212,0.1), transparent 18%);
      pointer-events: none;
    }

    header {
      margin-bottom: 28px;
    }

    .brand-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 2.2vw, 3rem);
      margin: 0 0 6px;
      letter-spacing: -0.04em;
      background: var(--accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-copy {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 290px;
    }

    #qr-output {
      position: absolute;
      left: -9999px;
      top: -9999px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 18px;
      overflow: hidden;
    }

    .panel h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      margin: 0 0 12px;
      letter-spacing: 0.02em;
    }

    .panel .section-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    label {
      font-size: 0.83rem;
      color: var(--muted);
    }

    .control {
      width: 100%;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    textarea,
    input[type="text"],
    input[type="color"],
    select {
      font-family: inherit;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 84px;
      resize: vertical;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
      max-height: 120px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      outline: none;
    }

    input[type="color"] {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .pill-group,
    .icon-grid,
    .radio-group,
    .button-stack {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      flex: 1 1 calc(33.333% - 10px);
      min-width: 92px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 14px;
      text-align: center;
      font-size: 0.9rem;
      cursor: pointer;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      transition: all 0.25s ease;
      user-select: none;
    }

    .pill.active {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: white;
      border-color: transparent;
      box-shadow: 0 12px 30px rgba(124,58,237,0.18);
    }

    .icon-grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      display: grid;
    }

    .icon-btn {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .icon-btn.active {
      border-color: rgba(124,58,237,0.8);
      background: rgba(124,58,237,0.16);
      transform: translateY(-1px);
    }

    .small-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .small-row .input-group {
      flex: 1;
      min-width: 120px;
    }

    .slider-row {
      display: grid;
      gap: 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #7c3aed;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-row input {
      width: 16px;
      height: 16px;
      accent-color: #7c3aed;
    }

    .warning-text {
      color: #f59e0b;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .button-stack button,
    .export-row button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      color: white;
      font-size: 0.94rem;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button-stack button:hover,
    .export-row button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(124,58,237,0.25);
    }

    .export-row {
      display: grid;
      gap: 12px;
    }

    #preview-card {
      position: relative;
      width: min(100%, 480px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 26px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      overflow: hidden;
      z-index: 1;
    }

    #preview-card::before {
      content: '';
      position: absolute;
      inset: -40px;
      background: radial-gradient(circle at 20% 20%, rgba(124,58,237,0.12), transparent 16%),
                  radial-gradient(circle at 80% 80%, rgba(6,182,212,0.1), transparent 16%);
      pointer-events: none;
      z-index: 0;
    }

    #preview-card > * {
      position: relative;
      z-index: 1;
    }

    #final-canvas {
      width: 100%;
      height: auto;
      border-radius: 20px;
      background: white;
      display: block;
      margin: 0 auto;
      max-width: 480px;
      aspect-ratio: 1 / 1;
    }

    .status-row {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .status-pill,
    .badge-pill {
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.92rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
    }

    .status-pill.active {
      border-color: rgba(16,185,129,0.35);
      color: #10b981;
    }

    .status-pill.risk {
      border-color: rgba(245,158,11,0.35);
      color: #f59e0b;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    #generate-btn {
      margin-top: 24px;
      width: 100%;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }
      #sidebar {
        width: 100%;
        min-width: 100%;
        height: auto;
        max-height: 60vh;
      }
      #preview-pane {
        padding: 24px 18px 18px;
        order: 1;
      }
      header {
        text-align: center;
      }
      .panel {
        margin-bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1 class="brand-title">QR Gen</h1>
        <p class="brand-copy">Create a beautiful, scan-ready QR code instantly with a sleek Obsidian Aura interface.</p>
      </header>

      <section class="panel" id="content-panel">
        <h2>CONTENT</h2>
        <div class="pill-group" id="type-pills">
          <div class="pill active" data-type="URL">URL</div>
          <div class="pill" data-type="Text">Text</div>
          <div class="pill" data-type="WiFi">WiFi</div>
          <div class="pill" data-type="vCard">vCard</div>
          <div class="pill" data-type="Email">Email</div>
        </div>
        <div class="control">
          <label for="text-input">QR payload</label>
          <textarea id="text-input" rows="3">https://example.com</textarea>
        </div>
      </section>

      <section class="panel">
        <h2>SIZE & ERROR</h2>
        <div class="control slider-row">
          <label for="size-slider">Size <span id="size-badge">256</span>px</label>
          <input id="size-slider" type="range" min="128" max="1024" value="256" />
        </div>
        <div class="radio-group" id="error-group">
          <label class="pill active"><input type="radio" name="correction" value="L" checked hidden />L</label>
          <label class="pill"><input type="radio" name="correction" value="M" hidden />M</label>
          <label class="pill"><input type="radio" name="correction" value="Q" hidden />Q</label>
          <label class="pill"><input type="radio" name="correction" value="H" hidden />H</label>
        </div>
      </section>

      <section class="panel">
        <h2>COLOURS</h2>
        <div class="small-row">
          <div class="input-group">
            <label for="fg-color">Foreground</label>
            <div class="small-row">
              <input id="fg-color" type="color" value="#111111" />
              <input id="fg-hex" type="text" value="#111111" />
            </div>
          </div>
          <div class="input-group">
            <label for="bg-color">Background</label>
            <div class="small-row">
              <input id="bg-color" type="color" value="#ffffff" />
              <input id="bg-hex" type="text" value="#ffffff" />
            </div>
          </div>
        </div>
        <div class="toggle-row">
          <input id="transparent-bg" type="checkbox" />
          <label for="transparent-bg">Transparent background</label>
        </div>
      </section>

      <section class="panel">
        <h2>DOT STYLE</h2>
        <div class="icon-grid" id="dot-style-grid">
          <button class="icon-btn active" type="button" data-style="square" title="Square"><svg width="20" height="20" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="3" fill="currentColor"/></svg></button>
          <button class="icon-btn" type="button" data-style="round" title="Round"><svg width="20" height="20" viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="7" fill="currentColor"/></svg></button>
          <button class="icon-btn" type="button" data-style="dots" title="Dots"><svg width="20" height="20" viewBox="0 0 24 24"><circle cx="7" cy="7" r="3" fill="currentColor"/><circle cx="17" cy="7" r="3" fill="currentColor"/><circle cx="7" cy="17" r="3" fill="currentColor"/><circle cx="17" cy="17" r="3" fill="currentColor"/></svg></button>
          <button class="icon-btn" type="button" data-style="diamond" title="Diamond"><svg width="20" height="20" viewBox="0 0 24 24"><polygon points="12,4 20,12 12,20 4,12" fill="currentColor"/></svg></button>
          <button class="icon-btn" type="button" data-style="star" title="Star"><svg width="20" height="20" viewBox="0 0 24 24"><polygon points="12,3 14.9,9.7 22,10.5 16.5,15.1 17.8,22 12,18.3 6.2,22 7.5,15.1 2,10.5 9.1,9.7" fill="currentColor"/></svg></button>
        </div>
      </section>

      <section class="panel">
        <h2>OVERLAY PATTERN</h2>
        <div class="control">
          <label for="pattern-select">Pattern</label>
          <select id="pattern-select">
            <option value="none">None</option>
            <option value="blossom">Cherry Blossom</option>
            <option value="waves">Ocean Waves</option>
            <option value="aurora">Aurora</option>
            <option value="hexagons">Hexagons</option>
            <option value="stardust">Stardust</option>
          </select>
        </div>
        <div class="control slider-row">
          <label for="pattern-opacity">Opacity <span id="pattern-badge">25%</span></label>
          <input id="pattern-opacity" type="range" min="0" max="50" value="25" />
        </div>
        <div class="warning-text" id="pattern-warning" style="display:none;">⚠ May affect scanning</div>
      </section>

      <section class="panel">
        <h2>CENTER LOGO</h2>
        <div class="control">
          <label for="logo-upload">Upload logo</label>
          <input id="logo-upload" type="file" accept="image/*" />
        </div>
        <div class="control">
          <label for="emoji-input">Use emoji instead</label>
          <input id="emoji-input" type="text" placeholder="🚀" maxlength="2" />
        </div>
        <div class="control slider-row">
          <label for="logo-size-slider">Logo size <span id="logo-size-badge">20%</span></label>
          <input id="logo-size-slider" type="range" min="10" max="30" value="20" />
        </div>
        <div class="icon-grid" id="logo-shape-grid">
          <button class="icon-btn active" type="button" data-logo-shape="circle" title="Circle"><svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" fill="currentColor"/></svg></button>
          <button class="icon-btn" type="button" data-logo-shape="square" title="Square"><svg width="20" height="20" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg></button>
          <button class="icon-btn" type="button" data-logo-shape="rounded" title="Rounded"><svg width="20" height="20" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="5" fill="currentColor"/></svg></button>
        </div>
        <div class="small-row">
          <div class="input-group">
            <label for="logo-border-color">Logo border</label>
            <div class="small-row">
              <input id="logo-border-color" type="color" value="#ffffff" />
              <input id="logo-border-hex" type="text" value="#ffffff" />
            </div>
          </div>
          <div class="toggle-row" style="flex:1;">
            <input id="logo-border-toggle" type="checkbox" checked />
            <label for="logo-border-toggle">Show border</label>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>FRAME & LABEL</h2>
        <div class="pill-group" id="frame-pills">
          <div class="pill active" data-frame="none">None</div>
          <div class="pill" data-frame="border">Border</div>
          <div class="pill" data-frame="card">Card</div>
          <div class="pill" data-frame="badge">Badge</div>
        </div>
        <div class="control">
          <label for="cta-input">CTA text</label>
          <input id="cta-input" type="text" placeholder="Scan Me!" value="Scan Me!" />
        </div>
        <div class="control slider-row">
          <label for="label-size-slider">Label size <span id="label-size-badge">16</span>px</label>
          <input id="label-size-slider" type="range" min="12" max="26" value="16" />
        </div>
        <div class="radio-group" id="label-position-group">
          <label class="pill active"><input type="radio" name="label-position" value="top" checked hidden />Top</label>
          <label class="pill"><input type="radio" name="label-position" value="bottom" hidden />Bottom</label>
        </div>
      </section>

      <section class="panel">
        <h2>EXPORT</h2>
        <div class="export-row">
          <button id="download-png">Download PNG</button>
          <button id="download-png-2x">Download PNG @2x</button>
          <button id="copy-clipboard">Copy to Clipboard</button>
        </div>
      </section>
    </aside>

    <main id="preview-pane">
      <div id="preview-card">
        <canvas id="final-canvas" width="480" height="480" aria-label="QR preview"></canvas>
        <div class="status-row">
          <span class="status-pill active" id="scannability-pill"><span class="status-dot"></span><span id="scannability-text">Scannable</span></span>
          <span class="badge-pill" id="content-badge">URL</span>
        </div>
        <button id="generate-btn">Generate QR</button>
      </div>
      <div id="qr-output"></div>
    </main>
  </div>

  <script>
    const defaultURL = 'https://example.com';
    const state = {
      text: defaultURL,
      type: 'URL',
      size: 256,
      error: 'H',
      fgColor: '#111111',
      bgColor: '#ffffff',
      transparentBg: false,
      dotStyle: 'square',
      pattern: 'none',
      patternOpacity: 25,
      logoImage: null,
      emoji: '',
      logoSize: 20,
      logoShape: 'circle',
      logoBorder: true,
      logoBorderColor: '#ffffff',
      frameStyle: 'none',
      labelText: 'Scan Me!',
      labelSize: 16,
      labelPosition: 'top'
    };
    let debounceTimer = null;

    const elements = {
      textInput: document.getElementById('text-input'),
      sizeSlider: document.getElementById('size-slider'),
      sizeBadge: document.getElementById('size-badge'),
      fgColor: document.getElementById('fg-color'),
      fgHex: document.getElementById('fg-hex'),
      bgColor: document.getElementById('bg-color'),
      bgHex: document.getElementById('bg-hex'),
      transparentBg: document.getElementById('transparent-bg'),
      errorRadios: document.querySelectorAll('input[name="correction"]'),
      dotStyleButtons: document.querySelectorAll('#dot-style-grid .icon-btn'),
      patternSelect: document.getElementById('pattern-select'),
      patternOpacity: document.getElementById('pattern-opacity'),
      patternBadge: document.getElementById('pattern-badge'),
      patternWarning: document.getElementById('pattern-warning'),
      logoUpload: document.getElementById('logo-upload'),
      emojiInput: document.getElementById('emoji-input'),
      logoSizeSlider: document.getElementById('logo-size-slider'),
      logoSizeBadge: document.getElementById('logo-size-badge'),
      logoShapeButtons: document.querySelectorAll('#logo-shape-grid .icon-btn'),
      logoBorderToggle: document.getElementById('logo-border-toggle'),
      logoBorderColor: document.getElementById('logo-border-color'),
      logoBorderHex: document.getElementById('logo-border-hex'),
      framePills: document.querySelectorAll('#frame-pills .pill'),
      ctaInput: document.getElementById('cta-input'),
      labelSizeSlider: document.getElementById('label-size-slider'),
      labelSizeBadge: document.getElementById('label-size-badge'),
      labelPositionRadios: document.querySelectorAll('input[name="label-position"]'),
      downloadPNG: document.getElementById('download-png'),
      downloadPNG2x: document.getElementById('download-png-2x'),
      copyClipboard: document.getElementById('copy-clipboard'),
      generateBtn: document.getElementById('generate-btn'),
      scannabilityText: document.getElementById('scannability-text'),
      scannabilityPill: document.getElementById('scannability-pill'),
      contentBadge: document.getElementById('content-badge'),
      typePills: document.querySelectorAll('#type-pills .pill'),
      finalCanvas: document.getElementById('final-canvas'),
      qrOutput: document.getElementById('qr-output')
    };

    function init() {
      if (typeof QRCode === 'undefined') {
        setTimeout(init, 100);
        return;
      }
      elements.textInput.value = defaultURL;
      elements.sizeBadge.textContent = `${state.size}`;
      elements.patternBadge.textContent = `${state.patternOpacity}%`;
      elements.logoSizeBadge.textContent = `${state.logoSize}%`;
      elements.labelSizeBadge.textContent = `${state.labelSize}`;
      elements.contentBadge.textContent = state.type;
      attachListeners();
      generateQR();
    }

    function attachListeners() {
      elements.typePills.forEach(pill => pill.addEventListener('click', onTypeSelect));
      elements.sizeSlider.addEventListener('input', onSizeChange);
      elements.fgColor.addEventListener('input', syncColorInput);
      elements.fgHex.addEventListener('input', syncHexInput);
      elements.bgColor.addEventListener('input', syncColorInput);
      elements.bgHex.addEventListener('input', syncHexInput);
      elements.transparentBg.addEventListener('change', onAnyChange);
      elements.errorRadios.forEach(r => r.addEventListener('change', onAnyChange));
      elements.dotStyleButtons.forEach(btn => btn.addEventListener('click', onDotStyleSelect));
      elements.patternSelect.addEventListener('change', onPatternChange);
      elements.patternOpacity.addEventListener('input', onPatternOpacityChange);
      elements.logoUpload.addEventListener('change', onLogoUpload);
      elements.emojiInput.addEventListener('input', onAnyChange);
      elements.logoSizeSlider.addEventListener('input', onLogoSizeChange);
      elements.logoShapeButtons.forEach(btn => btn.addEventListener('click', onLogoShapeSelect));
      elements.logoBorderToggle.addEventListener('change', onAnyChange);
      elements.logoBorderColor.addEventListener('input', syncBorderColorInput);
      elements.logoBorderHex.addEventListener('input', syncBorderHexInput);
      elements.framePills.forEach(pill => pill.addEventListener('click', onFrameSelect));
      elements.ctaInput.addEventListener('input', onAnyChange);
      elements.labelSizeSlider.addEventListener('input', onLabelSizeChange);
      elements.labelPositionRadios.forEach(r => r.addEventListener('change', onAnyChange));
      elements.generateBtn.addEventListener('click', generateQR);
      elements.downloadPNG.addEventListener('click', () => downloadPNG(1));
      elements.downloadPNG2x.addEventListener('click', () => downloadPNG(2));
      elements.copyClipboard.addEventListener('click', copyToClipboard);
      elements.textInput.addEventListener('input', onAnyChange);
      elements.textInput.addEventListener('change', onAnyChange);
    }

    function onTypeSelect(event) {
      elements.typePills.forEach(p => p.classList.remove('active'));
      event.currentTarget.classList.add('active');
      state.type = event.currentTarget.dataset.type;
      elements.contentBadge.textContent = state.type;
      switch (state.type) {
        case 'URL': elements.textInput.value = defaultURL; break;
        case 'Text': elements.textInput.value = 'Hello from QR Gen'; break;
        case 'WiFi': elements.textInput.value = 'WIFI:S:MyNetwork;T:WPA;P:SuperSecret;;'; break;
        case 'vCard': elements.textInput.value = 'BEGIN:VCARD\nVERSION:3.0\nN:Doe;Jane\nFN:Jane Doe\nEMAIL:jane@example.com\nEND:VCARD'; break;
        case 'Email': elements.textInput.value = 'mailto:hello@example.com?subject=Hello&body=Welcome%20to%20QR%20Gen'; break;
      }
      triggerGenerate();
    }

    function onSizeChange(event) {
      state.size = Number(event.target.value);
      elements.sizeBadge.textContent = state.size;
      triggerGenerate();
    }

    function syncColorInput(event) {
      const input = event.target;
      if (input.id === 'fg-color') {
        elements.fgHex.value = input.value;
        state.fgColor = input.value;
      } else {
        elements.bgHex.value = input.value;
        state.bgColor = input.value;
      }
      triggerGenerate();
    }

    function syncHexInput(event) {
      const input = event.target;
      if (!/^#[0-9A-Fa-f]{6}$/.test(input.value)) return;
      if (input.id === 'fg-hex') {
        elements.fgColor.value = input.value;
        state.fgColor = input.value;
      } else {
        elements.bgColor.value = input.value;
        state.bgColor = input.value;
      }
      triggerGenerate();
    }

    function onAnyChange() {
      triggerGenerate();
    }

    function onDotStyleSelect(event) {
      elements.dotStyleButtons.forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
      state.dotStyle = event.currentTarget.dataset.style;
      triggerGenerate();
    }

    function onPatternChange() {
      state.pattern = elements.patternSelect.value;
      triggerGenerate();
    }

    function onPatternOpacityChange(event) {
      state.patternOpacity = Number(event.target.value);
      elements.patternBadge.textContent = `${state.patternOpacity}%`;
      elements.patternWarning.style.display = state.patternOpacity > 35 ? 'flex' : 'none';
      triggerGenerate();
    }

    function onLogoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          state.logoImage = img;
          triggerGenerate();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function onLogoSizeChange(event) {
      state.logoSize = Number(event.target.value);
      elements.logoSizeBadge.textContent = `${state.logoSize}%`;
      triggerGenerate();
    }

    function onLogoShapeSelect(event) {
      elements.logoShapeButtons.forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
      state.logoShape = event.currentTarget.dataset.logoShape;
      triggerGenerate();
    }

    function syncBorderColorInput(event) {
      elements.logoBorderHex.value = event.target.value;
      state.logoBorderColor = event.target.value;
      triggerGenerate();
    }

    function syncBorderHexInput(event) {
      if (!/^#[0-9A-Fa-f]{6}$/.test(event.target.value)) return;
      elements.logoBorderColor.value = event.target.value;
      state.logoBorderColor = event.target.value;
      triggerGenerate();
    }

    function onFrameSelect(event) {
      elements.framePills.forEach(p => p.classList.remove('active'));
      event.currentTarget.classList.add('active');
      state.frameStyle = event.currentTarget.dataset.frame;
      triggerGenerate();
    }

    function onLabelSizeChange(event) {
      state.labelSize = Number(event.target.value);
      elements.labelSizeBadge.textContent = `${state.labelSize}`;
      triggerGenerate();
    }

    function triggerGenerate() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(generateQR, 400);
    }

    function setStateFromInputs() {
      state.text = elements.textInput.value || defaultURL;
      state.transparentBg = elements.transparentBg.checked;
      state.error = [...elements.errorRadios].find(r => r.checked).value;
      state.emoji = elements.emojiInput.value.trim();
      state.logoBorder = elements.logoBorderToggle.checked;
      state.labelText = elements.ctaInput.value.trim() || 'Scan Me!';
      state.labelPosition = [...elements.labelPositionRadios].find(r => r.checked).value;
    }

    function generateQR() {
      setStateFromInputs();
      elements.contentBadge.textContent = state.type;
      elements.scannabilityText.textContent = 'Scannable';
      elements.scannabilityPill.className = 'status-pill active';

      const qrOutput = elements.qrOutput;
      qrOutput.innerHTML = '';
      new QRCode(qrOutput, {
        text: state.text,
        width: state.size,
        height: state.size,
        colorDark: state.fgColor,
        colorLight: state.transparentBg ? 'rgba(255,255,255,0)' : state.bgColor,
        correctLevel: QRCode.CorrectLevel[state.error]
      });

      requestAnimationFrame(() => composeCanvas());
    }

    function composeCanvas() {
      const tempElement = elements.qrOutput.querySelector('img, canvas');
      if (!tempElement) {
        return setTimeout(composeCanvas, 50);
      }
      const canvas = elements.finalCanvas;
      canvas.width = state.size;
      canvas.height = state.size;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (state.transparentBg) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = state.bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      if (tempElement.tagName === 'IMG') {
        if (!tempElement.complete) {
          tempElement.onload = composeCanvas;
          return;
        }
        ctx.drawImage(tempElement, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.drawImage(tempElement, 0, 0, canvas.width, canvas.height);
      }

      ctx.save();
      ctx.globalAlpha = 0.25;
      drawOverlay(ctx, canvas.width, state.pattern);
      ctx.restore();

      drawCenterLogo(ctx, canvas.width);
      drawFrameAndLabel(ctx, canvas.width);
      evaluateScannability();
    }

    function drawOverlay(ctx, size, pattern) {
      if (pattern === 'none') return;
      const opacity = state.patternOpacity / 100;
      ctx.globalAlpha = opacity;
      if (pattern === 'blossom') {
        for (let i = 0; i < 16; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          const radius = 6 + Math.random() * 8;
          const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
          gradient.addColorStop(0, 'rgba(236,72,153,0.75)');
          gradient.addColorStop(1, 'rgba(236,72,153,0)');
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (pattern === 'waves') {
        ctx.strokeStyle = 'rgba(6,182,212,0.35)';
        ctx.lineWidth = 3;
        for (let y = 20; y < size; y += 40) {
          ctx.beginPath();
          for (let x = 0; x <= size; x += 8) {
            ctx.lineTo(x, y + Math.sin((x + y) * 0.05) * 10);
          }
          ctx.stroke();
        }
      } else if (pattern === 'aurora') {
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, 'rgba(124,58,237,0.35)');
        grad.addColorStop(0.5, 'rgba(6,182,212,0.35)');
        grad.addColorStop(1, 'rgba(236,72,153,0.35)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);
      } else if (pattern === 'hexagons') {
        ctx.strokeStyle = 'rgba(124,58,237,0.5)';
        ctx.lineWidth = 1;
        const step = 24;
        for (let y = -step; y < size + step; y += step * 0.85) {
          for (let x = -step; x < size + step; x += step * 1.75) {
            drawHex(ctx, x + (Math.floor(y / step) % 2 ? step * 0.9 : 0), y, step / 2);
          }
        }
      } else if (pattern === 'stardust') {
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        for (let i = 0; i < 40; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          ctx.fillRect(x, y, 2, 2);
          ctx.fillRect(x + 3, y - 1, 1, 4);
          ctx.fillRect(x - 1, y + 3, 4, 1);
        }
      }
    }

    function drawHex(ctx, x, y, radius) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i;
        const px = x + radius * Math.cos(angle);
        const py = y + radius * Math.sin(angle);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
    }

    function drawCenterLogo(ctx, size) {
      const center = size / 2;
      const logoSize = Math.floor(size * (state.logoSize / 100));
      if (!logoSize) return;
      if (!state.logoImage && !state.emoji) return;
      const padding = 8;
      const total = logoSize + padding * 2;
      ctx.save();
      ctx.beginPath();
      if (state.logoShape === 'circle') {
        ctx.arc(center, center, total / 2, 0, Math.PI * 2);
      } else if (state.logoShape === 'rounded') {
        roundRect(ctx, center - total / 2, center - total / 2, total, total, 14);
      } else {
        ctx.rect(center - total / 2, center - total / 2, total, total);
      }
      ctx.fillStyle = state.logoBorder ? state.logoBorderColor : 'rgba(255,255,255,0.9)';
      ctx.fill();
      ctx.clip();

      if (state.logoImage) {
        ctx.drawImage(state.logoImage, center - logoSize / 2, center - logoSize / 2, logoSize, logoSize);
      } else {
        ctx.fillStyle = '#000';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${logoSize}px serif`;
        ctx.fillText(state.emoji, center, center);
      }
      ctx.restore();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawFrameAndLabel(ctx, size) {
      if (state.frameStyle === 'none' && !state.labelText) return;
      const padding = 14;
      const labelPadding = 16;
      const bg = state.frameStyle === 'card' ? 'rgba(255,255,255,0.08)' : 'transparent';
      if (state.frameStyle !== 'none') {
        ctx.save();
        if (state.frameStyle === 'border') {
          ctx.strokeStyle = 'rgba(255,255,255,0.25)';
          ctx.lineWidth = 2;
          ctx.strokeRect(padding, padding, size - padding * 2, size - padding * 2);
        } else if (state.frameStyle === 'card') {
          ctx.fillStyle = bg;
          roundRect(ctx, padding, padding, size - padding * 2, size - padding * 2, 24);
          ctx.fill();
        } else if (state.frameStyle === 'badge') {
          ctx.fillStyle = 'rgba(124,58,237,0.18)';
          const radius = size * 0.12;
          ctx.beginPath();
          ctx.arc(size / 2, size / 2, radius + 12, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      if (state.labelText) {
        ctx.save();
        ctx.font = `${state.labelSize}px 'Syne', sans-serif`;
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const y = state.labelPosition === 'top' ? labelPadding : size - labelPadding;
        ctx.fillText(state.labelText, size / 2, y);
        ctx.restore();
      }
    }

    function evaluateScannability() {
      const risk = (state.pattern !== 'none' ? 1 : 0) + (state.logoSize > 25 ? 1 : 0) + (state.emoji ? 1 : 0);
      if (risk >= 2) {
        elements.scannabilityText.textContent = 'Risk of scanning';
        elements.scannabilityPill.className = 'status-pill risk';
      } else {
        elements.scannabilityText.textContent = 'Scannable';
        elements.scannabilityPill.className = 'status-pill active';
      }
    }

    function downloadPNG(scale = 1) {
      const canvas = document.createElement('canvas');
      canvas.width = state.size * scale;
      canvas.height = state.size * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.drawImage(elements.finalCanvas, 0, 0);
      const link = document.createElement('a');
      link.download = `qr-gen${scale === 1 ? '' : '@' + scale + 'x'}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function copyToClipboard() {
      try {
        const blob = await new Promise(resolve => elements.finalCanvas.toBlob(resolve));
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      } catch (error) {
        console.warn('Clipboard copy failed', error);
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
