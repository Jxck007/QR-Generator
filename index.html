<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora QR Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: rgba(255, 255, 255, 0.04);
            --bg-tertiary: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: linear-gradient(135deg, #7c3aed, #0ea5e9, #ec4899);
            --glow: rgba(124, 58, 237, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .aurora-header {
            position: relative;
            height: 120px;
            background: linear-gradient(45deg, #0a0a0f, #1a1a2e, #16213e, #0f3460);
            overflow: hidden;
        }

        .aurora-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.3), transparent 70%);
            border-radius: 50%;
            animation: aurora-float 6s ease-in-out infinite;
        }

        .aurora-blob:nth-child(1) {
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .aurora-blob:nth-child(2) {
            top: -50px;
            right: -50px;
            animation-delay: 2s;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.3), transparent 70%);
        }

        .aurora-blob:nth-child(3) {
            bottom: -100px;
            left: 50%;
            animation-delay: 4s;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.3), transparent 70%);
        }

        @keyframes aurora-float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .header-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
        }

        .container {
            display: flex;
            min-height: calc(100vh - 120px);
        }

        .sidebar {
            width: 350px;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            overflow-y: auto;
        }

        .main-panel {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section {
            margin-bottom: 2rem;
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-right: 0.5rem;
        }

        .section-rule {
            flex: 1;
            height: 1px;
            background: var(--accent);
        }

        .section-content {
            display: block;
        }

        .collapsed .section-content {
            display: none;
        }

        .input-tabs {
            display: flex;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: var(--accent);
            color: white;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.5rem;
        }

        .input-field:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.3);
        }

        .slider-container {
            margin-bottom: 1rem;
        }

        .slider {
            width: 100%;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }

        .slider-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .radio-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .radio-option {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-option input[type="radio"] {
            margin-right: 0.5rem;
        }

        .color-picker {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .color-input {
            width: 50px;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .hex-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 0.25rem 0.5rem;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            width: 80px;
        }

        .toggle {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .toggle input[type="checkbox"] {
            margin-right: 0.5rem;
        }

        .shape-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .shape-btn {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .shape-btn.active {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, 0.1);
        }

        .pattern-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .pattern-btn {
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .pattern-btn.active {
            background: var(--accent);
            color: white;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-right: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .preview-container {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 100%;
        }

        .preview-canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .scannability-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .scannability-good {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .scannability-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .phone-mockup {
            position: relative;
            display: inline-block;
        }

        .phone-frame {
            width: 250px;
            height: 500px;
            background: #000;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .phone-qr {
            max-width: 80%;
            max-height: 80%;
        }

        .export-options {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .history-strip {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .history-item {
            width: 80px;
            height: 80px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .history-item:hover {
            border-color: #7c3aed;
        }

        .history-qr {
            max-width: 100%;
            max-height: 100%;
            border-radius: 4px;
        }

        .loading-shimmer {
            position: relative;
            overflow: hidden;
        }

        .loading-shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                order: 2;
            }
            .main-panel {
                order: 1;
            }
            .header-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="aurora-header">
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="aurora-blob"></div>
        <div class="header-content">
            <h1 class="header-title">Aurora QR Generator</h1>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <!-- Input Types -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title">Input Type</span>
                    <div class="section-rule"></div>
                </div>
                <div class="section-content">
                    <div class="input-tabs">
                        <div class="tab active" data-type="url">URL</div>
                        <div class="tab" data-type="text">Text</div>
                        <div class="tab" data-type="email">Email</div>
                        <div class="tab" data-type="sms">SMS</div>
                        <div class="tab" data-type="phone">Phone</div>
                        <div class="tab" data-type="wifi">WiFi</div>
                        <div class="tab" data-type="vcard">vCard</div>
                        <div class="tab" data-type="social">Social</div>
                    </div>
                    <div id="input-fields">
                        <input type="text" class="input-field" id="url-input" placeholder="https://example.com" value="https://example.com">
                    </div>
                </div>
            </div>

            <!-- Style & Customization -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title">Style & Customization</span>
                    <div class="section-rule"></div>
                </div>
                <div class="section-content">
                    <div class="slider-container">
                        <label>Size: <span id="size-value">256</span>px</label>
                        <input type="range" class="slider" id="size-slider" min="128" max="1024" value="256">
                    </div>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="error-correction" value="L" checked> L
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="error-correction" value="M"> M
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="error-correction" value="Q"> Q
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="error-correction" value="H"> H
                        </label>
                    </div>
                    <div class="color-picker">
                        <label>Foreground:</label>
                        <input type="color" class="color-input" id="fg-color" value="#000000">
                        <input type="text" class="hex-input" id="fg-hex" value="#000000">
                    </div>
                    <div class="color-picker">
                        <label>Background:</label>
                        <input type="color" class="color-input" id="bg-color" value="#ffffff">
                        <input type="text" class="hex-input" id="bg-hex" value="#ffffff">
                        <label class="toggle">
                            <input type="checkbox" id="transparent-bg"> Transparent
                        </label>
                    </div>
                    <div>
                        <label>Dot Shape:</label>
                        <div class="shape-selector">
                            <div class="shape-btn active" data-shape="square">□</div>
                            <div class="shape-btn" data-shape="rounded">▢</div>
                            <div class="shape-btn" data-shape="dots">●</div>
                            <div class="shape-btn" data-shape="diamond">◆</div>
                            <div class="shape-btn" data-shape="star">★</div>
                        </div>
                    </div>
                    <div>
                        <label>Pattern Overlay:</label>
                        <div class="pattern-selector">
                            <div class="pattern-btn active" data-pattern="none">None</div>
                            <div class="pattern-btn" data-pattern="blossom">Blossom</div>
                            <div class="pattern-btn" data-pattern="waves">Waves</div>
                            <div class="pattern-btn" data-pattern="aurora">Aurora</div>
                            <div class="pattern-btn" data-pattern="hex">Hex</div>
                            <div class="pattern-btn" data-pattern="stardust">Stardust</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Center Logo -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title">Center Logo</span>
                    <div class="section-rule"></div>
                </div>
                <div class="section-content">
                    <input type="file" id="logo-upload" accept="image/*" style="margin-bottom: 1rem;">
                    <div class="slider-container">
                        <label>Logo Size: <span id="logo-size-value">20</span>%</label>
                        <input type="range" class="slider" id="logo-size-slider" min="10" max="35" value="20">
                    </div>
                    <div>
                        <label>Logo Shape:</label>
                        <div class="shape-selector">
                            <div class="shape-btn active" data-logo-shape="square">□</div>
                            <div class="shape-btn" data-logo-shape="circle">○</div>
                            <div class="shape-btn" data-logo-shape="rounded">▢</div>
                        </div>
                    </div>
                    <div class="color-picker">
                        <label>Border Color:</label>
                        <input type="color" class="color-input" id="logo-border-color" value="#ffffff">
                        <input type="text" class="hex-input" id="logo-border-hex" value="#ffffff">
                    </div>
                    <div class="slider-container">
                        <label>Border Thickness: <span id="border-thickness-value">2</span>px</label>
                        <input type="range" class="slider" id="border-thickness-slider" min="0" max="10" value="2">
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="logo-padding" checked> Logo Padding
                    </label>
                    <div style="margin-top: 1rem;">
                        <label>Or use Emoji:</label>
                        <input type="text" class="input-field" id="emoji-input" placeholder="🚀" maxlength="2">
                    </div>
                </div>
            </div>

            <!-- Frame & Label -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title">Frame & Label</span>
                    <div class="section-rule"></div>
                </div>
                <div class="section-content">
                    <div>
                        <label>Frame Style:</label>
                        <select class="input-field" id="frame-style">
                            <option value="none">None</option>
                            <option value="border">Simple Border</option>
                            <option value="rounded">Rounded Card</option>
                            <option value="badge">Badge</option>
                            <option value="banner">Banner Bottom</option>
                        </select>
                    </div>
                    <input type="text" class="input-field" id="label-text" placeholder="Scan Me">
                    <div class="slider-container">
                        <label>Label Size: <span id="label-size-value">16</span>px</label>
                        <input type="range" class="slider" id="label-size-slider" min="12" max="32" value="16">
                    </div>
                    <div class="color-picker">
                        <label>Label Color:</label>
                        <input type="color" class="color-input" id="label-color" value="#000000">
                        <input type="text" class="hex-input" id="label-hex" value="#000000">
                    </div>
                    <div>
                        <label>Label Position:</label>
                        <select class="input-field" id="label-position">
                            <option value="top">Top</option>
                            <option value="bottom">Bottom</option>
                        </select>
                    </div>
                    <div class="color-picker">
                        <label>Frame Background:</label>
                        <input type="color" class="color-input" id="frame-bg-color" value="#ffffff">
                        <input type="text" class="hex-input" id="frame-bg-hex" value="#ffffff">
                    </div>
                </div>
            </div>

            <!-- History & Presets -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title">History & Presets</span>
                    <div class="section-rule"></div>
                </div>
                <div class="section-content">
                    <input type="text" class="input-field" id="preset-name" placeholder="Preset name">
                    <button class="btn" onclick="savePreset()">Save Preset</button>
                    <div class="history-strip" id="history-strip"></div>
                </div>
            </div>
        </div>

        <div class="main-panel">
            <div class="preview-container">
                <div id="preview-wrapper" class="loading-shimmer">
                    <canvas id="qr-canvas" class="preview-canvas"></canvas>
                </div>
                <div id="scannability-indicator" class="scannability-indicator scannability-good">
                    ✓ Likely Scannable
                </div>
                <div style="margin-top: 1rem;">
                    <label class="toggle">
                        <input type="checkbox" id="phone-preview"> Phone Mockup
                    </label>
                </div>
                <div class="export-options">
                    <button class="btn" onclick="downloadPNG()">PNG</button>
                    <button class="btn" onclick="downloadPNG2x()">PNG @2x</button>
                    <button class="btn" onclick="downloadPNG3x()">PNG @3x</button>
                    <button class="btn" onclick="downloadSVG()">SVG</button>
                    <button class="btn secondary" onclick="copyToClipboard()">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let qrCode = null;
        let debounceTimer = null;
        let logoImage = null;
        let history = JSON.parse(localStorage.getItem('qrHistory') || '[]');
        let presets = JSON.parse(localStorage.getItem('qrPresets') || '{}');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            generateQR();
            loadHistory();
        });

        function setupEventListeners() {
            // Tab switching
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', switchTab);
            });

            // Input changes
            document.querySelectorAll('.input-field, .slider, input[type="radio"], input[type="checkbox"], select').forEach(el => {
                el.addEventListener('input', debounceGenerate);
                el.addEventListener('change', debounceGenerate);
            });

            // Color inputs
            document.querySelectorAll('.color-input').forEach(colorInput => {
                colorInput.addEventListener('input', function() {
                    const hexInput = this.nextElementSibling;
                    hexInput.value = this.value;
                    debounceGenerate();
                });
            });

            document.querySelectorAll('.hex-input').forEach(hexInput => {
                hexInput.addEventListener('input', function() {
                    const colorInput = this.previousElementSibling;
                    if (/^#[0-9A-F]{6}$/i.test(this.value)) {
                        colorInput.value = this.value;
                        debounceGenerate();
                    }
                });
            });

            // Shape selectors
            document.querySelectorAll('.shape-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.parentElement.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    debounceGenerate();
                });
            });

            // Pattern selectors
            document.querySelectorAll('.pattern-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.parentElement.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    debounceGenerate();
                });
            });

            // Logo upload
            document.getElementById('logo-upload').addEventListener('change', handleLogoUpload);

            // Slider values
            document.getElementById('size-slider').addEventListener('input', function() {
                document.getElementById('size-value').textContent = this.value;
            });

            document.getElementById('logo-size-slider').addEventListener('input', function() {
                document.getElementById('logo-size-value').textContent = this.value;
            });

            document.getElementById('border-thickness-slider').addEventListener('input', function() {
                document.getElementById('border-thickness-value').textContent = this.value;
            });

            document.getElementById('label-size-slider').addEventListener('input', function() {
                document.getElementById('label-size-value').textContent = this.value;
            });
        }

        function switchTab() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            updateInputFields();
            generateQR();
        }

        function updateInputFields() {
            const activeTab = document.querySelector('.tab.active').dataset.type;
            const inputContainer = document.getElementById('input-fields');
            
            let fields = '';
            switch (activeTab) {
                case 'url':
                    fields = '<input type="text" class="input-field" id="url-input" placeholder="https://example.com" value="https://example.com">';
                    break;
                case 'text':
                    fields = '<textarea class="input-field" id="text-input" placeholder="Enter your text here" rows="3">Hello World</textarea>';
                    break;
                case 'email':
                    fields = `
                        <input type="email" class="input-field" id="email-to" placeholder="to@example.com" value="to@example.com">

            inputContainer.innerHTML = fields;
            // Re-attach event listeners
            document.querySelectorAll('#input-fields .input-field, #input-fields select').forEach(el => {
                el.addEventListener('input', debounceGenerate);
                el.addEventListener('change', debounceGenerate);

        function debounceGenerate() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(generateQR, 300);
        }

        function getQRData() {
            const activeTab = document.querySelector('.tab.active').dataset.type;
            
            switch (activeTab) {
                case 'url':
                    return document.getElementById('url-input').value;
                case 'text':
                    return document.getElementById('text-input').value;
                case 'email':
                    const to = document.getElementById('email-to').value;
                    const subject = document.getElementById('email-subject').value;
                    const body = document.getElementById('email-body').value;
                    return `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                case 'sms':
                    const number = document.getElementById('sms-number').value;
                    const message = document.getElementById('sms-message').value;
                    return `sms:${number}?body=${encodeURIComponent(message)}`;
                case 'phone':
                    return `tel:${document.getElementById('phone-input').value}`;
                case 'wifi':
                    const ssid = document.getElementById('wifi-ssid').value;
                    const password = document.getElementById('wifi-password').value;
                    const encryption = document.getElementById('wifi-encryption').value;
                    return `WIFI:T:${encryption};S:${ssid};P:${password};;`;
                case 'vcard':
                    const name = document.getElementById('vcard-name').value;
                    const phone = document.getElementById('vcard-phone').value;
                    const email = document.getElementById('vcard-email').value;
                    const org = document.getElementById('vcard-org').value;
                    const url = document.getElementById('vcard-url').value;
                    return `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${phone}\nEMAIL:${email}\nORG:${org}\nURL:${url}\nEND:VCARD`;
                case 'social':
                    const platform = document.getElementById('social-platform').value;
                    const username = document.getElementById('social-username').value;
                    const urls = {
                        instagram: `https://instagram.com/${username}`,
                        twitter: `https://twitter.com/${username}`,
                        linkedin: `https://linkedin.com/in/${username}`
                    };
                    return urls[platform];
                default:
                    return 'https://example.com';
            }
        }

        function generateQR() {
            const data = getQRData();
            const canvas = document.getElementById('qr-canvas');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Get settings
            const size = parseInt(document.getElementById('size-slider').value);
            const fgColor = document.getElementById('fg-color').value;
            const bgColor = document.getElementById('bg-color').value;
            const transparentBg = document.getElementById('transparent-bg').checked;
            const errorCorrection = document.querySelector('input[name="error-correction"]:checked').value;
            const dotShape = document.querySelector('.shape-btn.active[data-shape]').dataset.shape;
            const pattern = document.querySelector('.pattern-btn.active').dataset.pattern;
            
            // Set canvas size
            canvas.width = size;
            canvas.height = size;
            
            // Generate QR with qrcode.js
            if (qrCode) {
                qrCode.clear();
            }
            
            const correctionLevel = { L: 1, M: 0, Q: 3, H: 2 }[errorCorrection];
            
            qrCode = new QRCode(document.createElement('div'), {
                text: data,
                width: size,
                height: size,
                colorDark: fgColor,
                colorLight: transparentBg ? 'rgba(0,0,0,0)' : bgColor,
                correctLevel: correctionLevel
            });
            
            // Wait for QR to generate, then draw on canvas
            setTimeout(() => {
                const qrImg = qrCode._oDrawing._elImage;
                if (qrImg) {
                    ctx.drawImage(qrImg, 0, 0, size, size);
                    
                    // Apply dot shape
                    applyDotShape(ctx, size, dotShape);
                    
                    // Apply pattern overlay
                    applyPattern(ctx, size, pattern);
                    
                    // Add logo
                    addLogo(ctx, size);
                    
                    // Add frame and label
                    addFrameAndLabel(ctx, size);
                    
                    // Update scannability
                    updateScannability();
                    
                    // Remove loading shimmer
                    document.getElementById('preview-wrapper').classList.remove('loading-shimmer');
                    
                    // Add to history
                    addToHistory();
                }
            }, 100);
            
            // Add loading shimmer
            document.getElementById('preview-wrapper').classList.add('loading-shimmer');
        }

        function applyDotShape(ctx, size, shape) {
            // This is a simplified implementation. In a real app, you'd modify the QR code generation
            // For now, we'll just leave the default square dots
        }

        function applyPattern(ctx, size, pattern) {
            ctx.globalAlpha = 0.3; // Semi-transparent
            
            switch (pattern) {
                case 'blossom':
                    // Cherry blossoms
                    for (let i = 0; i < 20; i++) {
                        const x = Math.random() * size;
                        const y = Math.random() * size;
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, Math.PI * 2);
                        ctx.fillStyle = '#ff69b4';
                        ctx.fill();
                    }
                    break;
                case 'waves':
                    // Ocean waves
                    ctx.strokeStyle = '#0ea5e9';
                    ctx.lineWidth = 2;
                    for (let y = 0; y < size; y += 20) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        for (let x = 0; x < size; x += 10) {
                            ctx.lineTo(x, y + Math.sin(x * 0.1) * 5);
                        }
                        ctx.stroke();
                    }
                    break;
                case 'aurora':
                    // Aurora gradient
                    const gradient = ctx.createLinearGradient(0, 0, size, size);
                    gradient.addColorStop(0, 'rgba(124, 58, 237, 0.5)');
                    gradient.addColorStop(0.5, 'rgba(14, 165, 233, 0.5)');
                    gradient.addColorStop(1, 'rgba(236, 72, 153, 0.5)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, size, size);
                    break;
                case 'hex':
                    // Hexagons
                    ctx.strokeStyle = '#7c3aed';
                    ctx.lineWidth = 1;
                    const hexSize = 15;
                    for (let x = 0; x < size; x += hexSize * 1.5) {
                        for (let y = 0; y < size; y += hexSize * Math.sqrt(3)) {
                            drawHexagon(ctx, x, y, hexSize);
                        }
                    }
                    break;
                case 'stardust':
                    // Stardust
                    for (let i = 0; i < 50; i++) {
                        const x = Math.random() * size;
                        const y = Math.random() * size;
                        ctx.beginPath();
                        ctx.arc(x, y, 1, 0, Math.PI * 2);
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                    }
                    break;
            }
            
            ctx.globalAlpha = 1;
        }

        function drawHexagon(ctx, x, y, size) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                const hx = x + size * Math.cos(angle);
                const hy = y + size * Math.sin(angle);
                if (i === 0) ctx.moveTo(hx, hy);
                else ctx.lineTo(hx, hy);
            }
            ctx.closePath();
            ctx.stroke();
        }

        function addLogo(ctx, size) {
            const logoSizePercent = parseInt(document.getElementById('logo-size-slider').value);
            const logoSize = (size * logoSizePercent) / 100;
            const centerX = size / 2;
            const centerY = size / 2;
            
            if (logoImage) {
                const logoShape = document.querySelector('.shape-btn.active[data-logo-shape]').dataset.logoShape;
                const borderColor = document.getElementById('logo-border-color').value;
                const borderThickness = parseInt(document.getElementById('border-thickness-slider').value);
                const padding = document.getElementById('logo-padding').checked ? logoSize * 0.1 : 0;
                
                ctx.save();
                ctx.beginPath();
                
                if (logoShape === 'circle') {
                    ctx.arc(centerX, centerY, logoSize / 2 + padding, 0, Math.PI * 2);
                } else if (logoShape === 'rounded') {
                    const radius = logoSize / 8;
                    ctx.roundRect(centerX - logoSize / 2 - padding, centerY - logoSize / 2 - padding, logoSize + padding * 2, logoSize + padding * 2, radius);
                } else {
                    ctx.rect(centerX - logoSize / 2 - padding, centerY - logoSize / 2 - padding, logoSize + padding * 2, logoSize + padding * 2);
                }
                
                ctx.fillStyle = borderColor;
                ctx.fill();
                
                // Draw logo
                ctx.beginPath();
                if (logoShape === 'circle') {
                    ctx.arc(centerX, centerY, logoSize / 2, 0, Math.PI * 2);
                } else if (logoShape === 'rounded') {
                    const radius = logoSize / 8;
                    ctx.roundRect(centerX - logoSize / 2, centerY - logoSize / 2, logoSize, logoSize, radius);
                } else {
                    ctx.rect(centerX - logoSize / 2, centerY - logoSize / 2, logoSize, logoSize);
                }
                ctx.clip();
                ctx.drawImage(logoImage, centerX - logoSize / 2, centerY - logoSize / 2, logoSize, logoSize);
                ctx.restore();
            } else if (document.getElementById('emoji-input').value) {
                const emoji = document.getElementById('emoji-input').value;
                ctx.font = `${logoSize}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(emoji, centerX, centerY);
            }
        }

        function addFrameAndLabel(ctx, size) {
            const frameStyle = document.getElementById('frame-style').value;
            const labelText = document.getElementById('label-text').value;
            const labelSize = parseInt(document.getElementById('label-size-slider').value);
            const labelColor = document.getElementById('label-color').value;
            const labelPosition = document.getElementById('label-position').value;
            const frameBgColor = document.getElementById('frame-bg-color').value;
            
            if (frameStyle !== 'none') {
                const framePadding = 20;
                const frameWidth = size + framePadding * 2;
                const frameHeight = size + framePadding * 2 + (labelText ? labelSize + 10 : 0);
                
                // Create new canvas for framed version
                const framedCanvas = document.createElement('canvas');
                framedCanvas.width = frameWidth;
                framedCanvas.height = frameHeight;
                const framedCtx = framedCanvas.getContext('2d');
                
                // Fill background
                framedCtx.fillStyle = frameBgColor;
                framedCtx.fillRect(0, 0, frameWidth, frameHeight);
                
                // Draw frame
                framedCtx.strokeStyle = labelColor;
                framedCtx.lineWidth = 2;
                
                if (frameStyle === 'border') {
                    framedCtx.strokeRect(framePadding, framePadding, size, size);
                } else if (frameStyle === 'rounded') {
                    framedCtx.beginPath();
                    framedCtx.roundRect(framePadding, framePadding, size, size, 10);
                    framedCtx.stroke();
                } else if (frameStyle === 'badge') {
                    framedCtx.beginPath();
                    framedCtx.arc(frameWidth / 2, framePadding + size / 2, size / 2 + 10, 0, Math.PI * 2);
                    framedCtx.stroke();
                } else if (frameStyle === 'banner') {
                    framedCtx.strokeRect(framePadding, framePadding, size, size);
                    framedCtx.fillStyle = frameBgColor;
                    framedCtx.fillRect(framePadding, size + framePadding, size, framePadding);
                }
                
                // Draw QR
                framedCtx.drawImage(ctx.canvas, framePadding, framePadding);
                
                // Draw label
                if (labelText) {
                    framedCtx.fillStyle = labelColor;
                    framedCtx.font = `${labelSize}px Syne`;
                    framedCtx.textAlign = 'center';
                    const labelY = labelPosition === 'top' ? framePadding - 5 : frameHeight - 5;
                    framedCtx.fillText(labelText, frameWidth / 2, labelY);
                }
                
                // Replace main canvas content
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(framedCanvas, 0, 0, size, size);
            } else if (labelText) {
                // Just label, no frame
                ctx.fillStyle = labelColor;
                ctx.font = `${labelSize}px Syne`;
                ctx.textAlign = 'center';
                const labelY = labelPosition === 'top' ? -5 : size + labelSize + 5;
                ctx.fillText(labelText, size / 2, labelY);
            }
        }

        function updateScannability() {
            const pattern = document.querySelector('.pattern-btn.active').dataset.pattern;
            const logoSize = parseInt(document.getElementById('logo-size-slider').value);
            const indicator = document.getElementById('scannability-indicator');
            
            const riskFactors = (pattern !== 'none' ? 1 : 0) + (logoSize > 25 ? 1 : 0) + (logoImage ? 1 : 0);
            
            if (riskFactors >= 2) {
                indicator.className = 'scannability-indicator scannability-warning';
                indicator.textContent = '⚠ Scannability Risk - Reduce logo size or remove pattern';
            } else {
                indicator.className = 'scannability-indicator scannability-good';
                indicator.textContent = '✓ Likely Scannable';
            }
        }

        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        logoImage = img;
                        generateQR();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function downloadPNG() {
            const canvas = document.getElementById('qr-canvas');
            const link = document.createElement('a');
            link.download = 'qr-code.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function downloadPNG2x() {
            downloadScaled(2);
        }

        function downloadPNG3x() {
            downloadScaled(3);
        }

        function downloadScaled(scale) {
            const canvas = document.getElementById('qr-canvas');
            const scaledCanvas = document.createElement('canvas');
            scaledCanvas.width = canvas.width * scale;
            scaledCanvas.height = canvas.height * scale;
            const ctx = scaledCanvas.getContext('2d');
            ctx.scale(scale, scale);
            ctx.drawImage(canvas, 0, 0);
            
            const link = document.createElement('a');
            link.download = `qr-code@${scale}x.png`;
            link.href = scaledCanvas.toDataURL();
            link.click();
        }

        function downloadSVG() {
            // For simplicity, we'll just download as PNG. A full implementation would generate SVG
            downloadPNG();

        function copyToClipboard() {
            const canvas = document.getElementById('qr-canvas');
            canvas.toBlob(function(blob) {
                navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            });
        }

        function addToHistory() {
            const canvas = document.getElementById('qr-canvas');
            const dataURL = canvas.toDataURL();
            
            history.unshift(dataURL);
            if (history.length > 5) {
                history.pop();
            }
            
            localStorage.setItem('qrHistory', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const strip = document.getElementById('history-strip');
            strip.innerHTML = '';
            
            history.forEach((dataURL, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                const img = document.createElement('img');
                img.src = dataURL;
                img.className = 'history-qr';
                item.appendChild(img);
                item.onclick = () => loadFromHistory(index);
                strip.appendChild(item);
            });
        }
